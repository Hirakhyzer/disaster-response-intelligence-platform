<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="690" viewBox="0 0 1440 690" role="img" aria-labelledby="title desc">
<title id="title">Disaster response intelligence workflow</title><desc id="desc">Conceptual workflow linking hazard zones, exposed assets, population vulnerability, resource allocation, and human-reviewed response decisions.</desc>
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fffaf2"/><stop offset="1" stop-color="#f1f8ff"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#31516a" flood-opacity=".16"/></filter><marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L12 6 L0 12z" fill="#59768e"/></marker><style>.h{font-family:Arial,Helvetica,sans-serif;font-size:31px;font-weight:700;fill:#19344d}.s{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#5c768b}.tag{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#277c94}.t{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;fill:#19344d}.b{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#49657a}.small{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#71899b}.white{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;fill:#fff}</style></defs>
<rect width="1440" height="690" fill="url(#bg)"/><text x="70" y="70" class="h">Human-controlled emergency coordination workflow</text><text x="70" y="102" class="s">The platform produces situational awareness and planning evidence; official public warnings and dispatch decisions remain outside the software.</text><line x1="70" y1="132" x2="1370" y2="132" stroke="#d9e6ee"/>
<g filter="url(#shadow)"><rect x="82" y="192" width="265" height="335" rx="20" fill="#fff" stroke="#c7dae5"/><text x="110" y="230" class="tag">PRIORITY ZONES</text><text x="110" y="272" class="t">Hazard + exposure</text><text x="110" y="306" class="b">Flood / wildfire intensity</text><text x="110" y="332" class="b">Population vulnerability</text><text x="110" y="358" class="b">Critical infrastructure</text><rect x="110" y="400" width="205" height="58" rx="12" fill="#ecf8fa"/><text x="128" y="425" class="small">Output:</text><text x="128" y="445" class="small">ranked alert zones</text></g>
<g filter="url(#shadow)"><rect x="455" y="192" width="265" height="335" rx="20" fill="#163b52"/><text x="485" y="230" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#74e3dc">RESOURCE MATCHING</text><text x="485" y="272" class="white" style="font-size:18px">Teams and supplies</text><text x="485" y="306" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#c9dde8">Shelter capacity gap</text><text x="485" y="332" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#c9dde8">Medical and rescue demand</text><text x="485" y="358" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#c9dde8">Resource-to-zone assignment</text><rect x="485" y="400" width="205" height="58" rx="12" fill="#244f68"/><text x="505" y="425" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#d7eef5">Output:</text><text x="505" y="445" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#d7eef5">planning recommendation only</text></g>
<g filter="url(#shadow)"><rect x="828" y="192" width="265" height="335" rx="20" fill="#fff" stroke="#c7dae5"/><text x="856" y="230" class="tag">ROUTE RISK</text><text x="856" y="272" class="t">Passability and access</text><text x="856" y="306" class="b">Road-risk threshold</text><text x="856" y="332" class="b">Shortest risk-adjusted path</text><text x="856" y="358" class="b">Unreachable route flag</text><rect x="856" y="400" width="205" height="58" rx="12" fill="#fff0db"/><text x="874" y="425" class="small">Output:</text><text x="874" y="445" class="small">route feasibility evidence</text></g>
<g filter="url(#shadow)"><rect x="1200" y="192" width="165" height="335" rx="20" fill="#453823"/><text x="1224" y="230" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#ffe4a6">INCIDENT COMMAND</text><text x="1224" y="272" class="white" style="font-size:18px">Review</text><text x="1224" y="306" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#f2dfc6">Approve</text><text x="1224" y="332" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#f2dfc6">Modify</text><text x="1224" y="358" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#f2dfc6">Coordinate</text><rect x="1224" y="400" width="110" height="58" rx="12" fill="#574629"/><text x="1238" y="425" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#ffe8bf">No automatic</text><text x="1238" y="445" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#ffe8bf">dispatch</text></g>
<path d="M347 360 H443" stroke="#59768e" stroke-width="3" marker-end="url(#arr)"/><path d="M720 360 H816" stroke="#59768e" stroke-width="3" marker-end="url(#arr)"/><path d="M1093 360 H1188" stroke="#59768e" stroke-width="3" marker-end="url(#arr)"/>
<g filter="url(#shadow)"><rect x="250" y="585" width="940" height="54" rx="17" fill="#fef3dc" stroke="#e5bb79"/><text x="285" y="619" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;fill:#21384f">Audit rule:</text><text x="382" y="619" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#49657a">every map, table, recommendation, and briefing is reproducibly generated from a declared synthetic or authorized data source.</text></g>
</svg>
