<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="790" viewBox="0 0 1440 790" role="img" aria-labelledby="title desc">
<title id="title">Climate and disaster response intelligence architecture</title><desc id="desc">Conceptual pipeline from weather, satellite-style hazard layers, infrastructure, population, and resources through risk scoring, planning, maps, reports, and auditability.</desc>
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#071823"/><stop offset="1" stop-color="#123d4d"/></linearGradient><linearGradient id="teal" x1="0" x2="1"><stop stop-color="#31d4c7"/><stop offset="1" stop-color="#68a6ff"/></linearGradient><linearGradient id="amber" x1="0" x2="1"><stop stop-color="#ffd972"/><stop offset="1" stop-color="#f28a5f"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".32"/></filter><marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L12 6 L0 12z" fill="#a8cfe3"/></marker><style>.h{font-family:Arial,Helvetica,sans-serif;font-size:34px;font-weight:700;fill:#f8fcff}.s{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#bfd9e7}.t{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;fill:#f8fcff}.b{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#c8dde8}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#9ebdca}.tag{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#76e8dc}.num{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;fill:#071823}</style></defs>
<rect width="1440" height="790" fill="url(#bg)"/><circle cx="1285" cy="90" r="185" fill="#245d67" opacity=".28"/><circle cx="115" cy="760" r="230" fill="#0b6371" opacity=".18"/>
<text x="70" y="76" class="h">Climate and Disaster Response Intelligence Platform</text><text x="70" y="108" class="s">Synthetic-first research architecture for hazard, exposure, infrastructure, resources, maps, and auditable emergency decision support.</text><line x1="70" y1="140" x2="1370" y2="140" stroke="#2e6374"/>
<g filter="url(#shadow)"><rect x="70" y="190" width="250" height="214" rx="18" fill="#123247" stroke="#376d7e"/><rect x="94" y="214" width="42" height="26" rx="13" fill="url(#teal)"/><text x="109" y="233" class="num">01</text><text x="94" y="274" class="t">Scenario layers</text><text x="94" y="307" class="b">Weather indices</text><text x="94" y="333" class="b">Terrain and drainage</text><text x="94" y="359" class="b">Vegetation and dryness</text><text x="94" y="386" class="tiny">Synthetic now; public data adapters later</text></g>
<g filter="url(#shadow)"><rect x="390" y="190" width="250" height="214" rx="18" fill="#123247" stroke="#376d7e"/><rect x="414" y="214" width="42" height="26" rx="13" fill="url(#teal)"/><text x="429" y="233" class="num">02</text><text x="414" y="274" class="t">Hazard engine</text><text x="414" y="307" class="b">Flood intensity</text><text x="414" y="333" class="b">Wildfire intensity</text><text x="414" y="359" class="b">Combined hazard grid</text><text x="414" y="386" class="tiny">Transparent component indices</text></g>
<g filter="url(#shadow)"><rect x="710" y="190" width="250" height="214" rx="18" fill="#123247" stroke="#376d7e"/><rect x="734" y="214" width="42" height="26" rx="13" fill="url(#teal)"/><text x="749" y="233" class="num">03</text><text x="734" y="274" class="t">Exposure model</text><text x="734" y="307" class="b">Population vulnerability</text><text x="734" y="333" class="b">Hospitals, shelters, roads</text><text x="734" y="359" class="b">Critical infrastructure</text><text x="734" y="386" class="tiny">Asset-risk bands and priority zones</text></g>
<g filter="url(#shadow)"><rect x="1030" y="190" width="340" height="214" rx="18" fill="#123247" stroke="#376d7e"/><rect x="1054" y="214" width="42" height="26" rx="13" fill="url(#teal)"/><text x="1069" y="233" class="num">04</text><text x="1054" y="274" class="t">Response planning</text><text x="1054" y="307" class="b">Alert prioritization</text><text x="1054" y="333" class="b">Resource allocation</text><text x="1054" y="359" class="b">Risk-adjusted route scoring</text><text x="1054" y="386" class="tiny">Human approval required</text></g>
<path d="M320 296 H382" stroke="#a8cfe3" stroke-width="3" marker-end="url(#arr)"/><path d="M640 296 H702" stroke="#a8cfe3" stroke-width="3" marker-end="url(#arr)"/><path d="M960 296 H1022" stroke="#a8cfe3" stroke-width="3" marker-end="url(#arr)"/>
<g filter="url(#shadow)"><rect x="120" y="520" width="350" height="178" rx="18" fill="#123d4a" stroke="#38949a"/><text x="146" y="555" class="tag">MAP INTELLIGENCE</text><text x="146" y="592" class="t">Hazard and exposure maps</text><text x="146" y="623" class="b">Hazard heatmap with assets</text><text x="146" y="649" class="b">Vulnerability and priority zones</text><text x="146" y="675" class="tiny">Generated locally after execution</text></g>
<g filter="url(#shadow)"><rect x="545" y="520" width="350" height="178" rx="18" fill="#393044" stroke="#8d70a5"/><text x="571" y="555" class="tag" fill="#ffdca0">RESOURCE COORDINATION</text><text x="571" y="592" class="t">Shelters, teams and routes</text><text x="571" y="623" class="b">Capacity gap estimation</text><text x="571" y="649" class="b">Resource-to-zone assignment</text><text x="571" y="675" class="tiny">Recommendation, not dispatch</text></g>
<g filter="url(#shadow)"><rect x="970" y="520" width="350" height="178" rx="18" fill="#443824" stroke="#bc9050"/><text x="996" y="555" class="tag" fill="#ffe4a6">AUDITABLE OUTPUTS</text><text x="996" y="592" class="t">Reports, CSVs and ledger</text><text x="996" y="623" class="b">Briefing, figures, result tables</text><text x="996" y="649" class="b">Hash-chained run record</text><text x="996" y="675" class="tiny">Official decisions remain external</text></g>
<path d="M1200 404 C1200 460 1145 470 1145 510" fill="none" stroke="#ffd972" stroke-width="3" marker-end="url(#arr)"/><path d="M1200 404 C1200 460 720 470 720 510" fill="none" stroke="#ffd972" stroke-width="3" marker-end="url(#arr)"/><path d="M1200 404 C1200 460 295 470 295 510" fill="none" stroke="#ffd972" stroke-width="3" marker-end="url(#arr)"/>
<text x="70" y="750" class="tiny">This platform is research decision support only. It does not issue official warnings, evacuations, road closures, or dispatch orders.</text>
</svg>
